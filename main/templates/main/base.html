{% load static %}<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pranish Shrestha | Backend Developer</title>
<meta name="description" content="Pranish Shrestha — Backend Developer & Educator from Hetauda, Nepal. Django, Python, Flask." />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#0a1320',
          panel: '#0f1c2e',
          panel2: '#152a44',
          line: '#1d3354',
          accent: '#10b981',
          accent2: '#34d399',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body class="bg-ink text-slate-100 font-sans antialiased">

<!-- NAV -->
<header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-md bg-ink/70 border-b border-line/50">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="#hero" class="text-accent font-bold text-xl tracking-tight">PS<span class="text-accent2">.</span></a>
    <ul class="hidden md:flex items-center gap-8 text-sm text-slate-300">
      <li><a href="#about" class="hover:text-accent transition">About</a></li>
      <li><a href="#skills" class="hover:text-accent transition">Skills</a></li>
      <li><a href="#experience" class="hover:text-accent transition">Experience</a></li>
      <li><a href="#projects" class="hover:text-accent transition">Projects</a></li>
      <li><a href="#contact" class="hover:text-accent transition">Contact</a></li>
    </ul>
    <a href="#contact" class="hidden md:inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-accent text-ink font-semibold text-sm hover:bg-accent2 transition">Hire Me</a>
  </nav>
</header>

<main>
  {% block content %}
  {% endblock %}
</main>

<footer class="py-10 px-6 text-center text-sm text-slate-500 border-t border-line/50">
  <p>Built with Django, Tailwind & Twilio. &copy; <span id="year"></span> Pranish Shrestha.</p>
</footer>

<script src="{% static 'main/js/main.js' %}"></script>
</body>
</html>
