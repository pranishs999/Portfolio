{% load static %}<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | Pranish Shrestha</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#0a1320',
          panel: '#0f1c2e',
          panel2: '#152a44',
          line: '#1d3354',
          accent: '#10b981',
          accent2: '#34d399',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
      },
    },
  };
</script>
</head>
<body class="bg-ink text-slate-100 font-sans antialiased min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="text-accent font-bold text-3xl tracking-tight inline-block">PS<span class="text-accent2">.</span></a>
      <p class="mt-2 text-slate-400 text-sm">Sign in to access the dashboard</p>
    </div>

    <!-- Login Card -->
    <div class="bg-panel rounded-2xl border border-line p-8 shadow-2xl shadow-black/30">

      {% if form.errors %}
      <div class="mb-6 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm flex items-center gap-2">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <span>Invalid username or password. Please try again.</span>
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="space-y-5">
          <div>
            <label for="id_username" class="block mb-2 text-sm font-medium text-slate-300">Username</label>
            <input type="text" name="username" id="id_username" autofocus required
              class="w-full bg-ink border border-line rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition"
              placeholder="Enter your username" />
          </div>
          <div>
            <label for="id_password" class="block mb-2 text-sm font-medium text-slate-300">Password</label>
            <input type="password" name="password" id="id_password" required
              class="w-full bg-ink border border-line rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition"
              placeholder="Enter your password" />
          </div>
          <button type="submit" class="w-full px-5 py-3 rounded-lg bg-accent text-ink font-semibold hover:bg-accent2 transition">
            Sign In
          </button>
        </div>
      </form>
    </div>

    <!-- Back link -->
    <p class="text-center mt-6 text-sm text-slate-500">
      <a href="/" class="hover:text-accent transition">&larr; Back to portfolio</a>
    </p>
  </div>

</body>
</html>
